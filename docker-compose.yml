# Planogram Compliance System — Local Infrastructure Compose
# To start the infrastructure, run:
#   docker-compose up -d
#
# To check health status of services:
#   docker-compose ps
#
# Service configurations and exposed ports:
#   - PostgreSQL 15 (with pgvector) on port 5432
#   - Redis 7 on port 6379
#   - MinIO Object Storage on port 9000 (API) and 9001 (Console UI)

version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: planogram_postgres
    restart: always
    environment:
      POSTGRES_DB: planogram_compliance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d planogram_compliance" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: planogram_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-08-29T23-07-35Z
    container_name: planogram_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
